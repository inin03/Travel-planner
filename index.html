<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRAVEL — 여행 플래너</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0f0e0b; --paper:#faf8f3; --cream:#f2ede3; --sand:#e8dfc8;
  --terracotta:#c9623f; --terracotta-light:#e8845f; --ocean:#2a5c7a;
  --gold:#c9a84c; --muted:#8a8070; --border:#d4c9b0;
  --shadow:0 4px 24px rgba(15,14,11,.10); --shadow-lg:0 12px 48px rgba(15,14,11,.18);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;overflow-x:hidden;}

/* HEADER */
header{background:var(--ink);color:var(--paper);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.3);}
.logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;letter-spacing:5px;color:var(--gold);cursor:pointer;}
.logo span{font-style:italic;font-weight:400;}
.header-center{font-size:13px;font-weight:300;color:var(--sand);letter-spacing:1px;}
.header-actions{display:flex;gap:8px;align-items:center;}
.btn-sm{background:var(--terracotta);color:white;border:none;padding:7px 14px;border-radius:4px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:background .2s;white-space:nowrap;}
.btn-sm:hover{background:var(--terracotta-light);}
.btn-sm.ghost{background:transparent;border:1px solid #555;}
.btn-sm.ghost:hover{background:#333;}

/* HOME */
#homeScreen{display:block;} #plannerScreen{display:none;}
.home-hero{background:var(--ink);padding:44px 24px 34px;text-align:center;position:relative;overflow:hidden;}
.home-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(201,162,76,.15) 0%,transparent 60%),radial-gradient(ellipse at 70% 30%,rgba(42,92,122,.2) 0%,transparent 60%);}
.home-hero-title{font-family:'Playfair Display',serif;font-size:clamp(30px,6vw,52px);font-weight:900;color:var(--gold);letter-spacing:8px;position:relative;z-index:1;margin-bottom:6px;}
.home-hero-title span{font-style:italic;font-weight:400;}
.home-hero-sub{font-size:13px;font-weight:300;color:var(--muted);letter-spacing:2px;position:relative;z-index:1;margin-bottom:28px;}
.btn-new-trip{background:var(--terracotta);color:white;border:none;padding:13px 32px;border-radius:30px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .25s;position:relative;z-index:1;box-shadow:0 4px 20px rgba(201,98,63,.4);display:inline-flex;align-items:center;gap:8px;}
.btn-new-trip:hover{background:var(--terracotta-light);transform:translateY(-2px);box-shadow:0 8px 28px rgba(201,98,63,.45);}
.home-content{padding:24px;max-width:800px;margin:0 auto;}
.home-section-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:16px;color:var(--ink);display:flex;align-items:center;gap:10px;}
.home-section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.trip-list{display:flex;flex-direction:column;gap:12px;}
.trip-item{background:white;border:1px solid var(--border);border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.trip-item:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);border-color:var(--terracotta);}
.trip-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--terracotta);border-radius:4px 0 0 4px;}
.trip-thumb{width:58px;height:58px;border-radius:10px;background:linear-gradient(135deg,var(--sand),var(--cream));display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;}
.trip-info{flex:1;min-width:0;}
.trip-item-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.trip-item-meta{font-size:12px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;}
.trip-item-badge{background:var(--cream);border:1px solid var(--border);padding:2px 8px;border-radius:10px;font-size:10px;color:var(--muted);}
.trip-item-actions{display:flex;gap:6px;opacity:0;transition:opacity .2s;}
.trip-item:hover .trip-item-actions{opacity:1;}
.btn-icon-sm{background:none;border:1px solid var(--border);border-radius:6px;width:30px;height:30px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--muted);}
.btn-icon-sm:hover{background:var(--cream);color:var(--ink);}
.btn-icon-sm.del:hover{background:#fee;color:#c00;border-color:#fcc;}
.home-empty{text-align:center;padding:52px 20px;color:var(--muted);}
.home-empty-icon{font-size:52px;margin-bottom:16px;opacity:.35;display:block;}
.home-empty-text{font-size:14px;font-weight:300;line-height:1.8;}

/* PLANNER META */
.trip-meta{background:var(--cream);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:18px;align-items:center;flex-wrap:wrap;}
.meta-item{display:flex;align-items:center;gap:7px;}
.meta-label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;}
.meta-value input{background:transparent;border:none;border-bottom:1px dashed var(--border);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;color:var(--ink);width:130px;outline:none;padding:2px 0;}

/* TABS */
.tabs-wrapper{background:var(--ink);padding:0 24px;display:flex;overflow-x:auto;scrollbar-width:none;}
.tabs-wrapper::-webkit-scrollbar{display:none;}
.tab-btn{background:none;border:none;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;padding:13px 20px;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.tab-btn:hover{color:var(--sand);}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab-content{display:none;padding:20px;max-width:1200px;margin:0 auto;}
.tab-content.active{display:block;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid var(--sand);}
.section-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
.btn-add{background:var(--terracotta);color:white;border:none;padding:8px 16px;border-radius:6px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;}
.btn-add:hover{background:var(--terracotta-light);transform:translateY(-1px);}

/* DAY TABS */
.day-tabs{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap;}
.day-tab{background:var(--cream);border:1px solid var(--border);border-radius:30px;padding:6px 16px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;color:var(--muted);}
.day-tab:hover{border-color:var(--terracotta);color:var(--terracotta);}
.day-tab.active{background:var(--terracotta);border-color:var(--terracotta);color:white;}
.btn-day-add{background:transparent;border:1px dashed var(--border);border-radius:30px;padding:6px 16px;font-size:12px;cursor:pointer;color:var(--muted);transition:all .2s;}
.btn-day-add:hover{border-color:var(--terracotta);color:var(--terracotta);}

/* TIMELINE */
.timeline{position:relative;padding-left:58px;}
.timeline::before{content:'';position:absolute;left:26px;top:12px;bottom:12px;width:2px;background:linear-gradient(to bottom,var(--terracotta),var(--ocean));border-radius:2px;}
.timeline-item{position:relative;margin-bottom:14px;animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.timeline-dot{position:absolute;left:-36px;top:16px;width:14px;height:14px;border-radius:50%;background:var(--terracotta);border:3px solid var(--paper);box-shadow:0 0 0 2px var(--terracotta);}
.timeline-time{position:absolute;left:-56px;top:13px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-align:right;width:42px;transform:translateX(-100%);margin-left:-6px;}
.timeline-card{background:white;border:1px solid var(--border);border-radius:10px;padding:12px 14px;box-shadow:var(--shadow);transition:all .2s;}
.timeline-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px);}
.timeline-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.timeline-card-title{font-size:14px;font-weight:700;margin-bottom:3px;}
.timeline-card-sub{font-size:12px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;}
.timeline-badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;flex-shrink:0;}
.badge-activity{background:#e8f5e9;color:#2e7d32} .badge-meal{background:#fff3e0;color:#e65100}
.badge-transport{background:#e3f2fd;color:#1565c0} .badge-hotel{background:#f3e5f5;color:#6a1b9a} .badge-etc{background:#f5f5f5;color:#616161}
.card-actions{display:flex;gap:3px;opacity:0;transition:opacity .2s;}
.timeline-card:hover .card-actions{opacity:1;}
.btn-icon{background:none;border:1px solid var(--border);border-radius:4px;width:26px;height:26px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--muted);}
.btn-icon:hover{background:var(--cream);color:var(--ink);}
.btn-icon.del:hover{background:#fee;color:#c00;border-color:#fcc;}

/* RESERVATION */
.res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.res-card{background:white;border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);transition:all .2s;}
.res-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);}
.res-card-header{padding:12px 14px 9px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--cream);}
.res-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.res-icon.flight{background:#e3f2fd} .res-icon.hotel{background:#f3e5f5} .res-icon.tour{background:#e8f5e9} .res-icon.car{background:#fff3e0} .res-icon.other{background:#f5f5f5}
.res-card-type{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:1px;}
.res-card-name{font-size:14px;font-weight:700;}
.res-card-body{padding:10px 14px;}
.res-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;}
.res-row-label{color:var(--muted)} .res-row-value{font-weight:500}
.res-card-footer{padding:9px 14px;background:var(--cream);display:flex;align-items:center;justify-content:space-between;}
.res-status{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;}
.status-confirmed{background:#e8f5e9;color:#2e7d32} .status-pending{background:#fff3e0;color:#e65100} .status-cancelled{background:#ffebee;color:#c62828}
.res-cost{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--terracotta);}

/* BUDGET */
.budget-overview{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px;}
.budget-card{background:white;border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.budget-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.budget-card.total::before{background:var(--gold)} .budget-card.spent::before{background:var(--terracotta)}
.budget-card.remaining::before{background:var(--ocean)} .budget-card.per-day::before{background:#66bb6a}
.budget-card-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;}
.budget-card-amount{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;}
.budget-card-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.progress-bar{width:100%;height:5px;background:var(--sand);border-radius:3px;margin-top:8px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(to right,var(--terracotta),var(--terracotta-light));transition:width .6s ease;}
.category-breakdown{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:22px;}
.pie-section{background:white;border:1px solid var(--border);border-radius:12px;padding:18px;box-shadow:var(--shadow);}
.pie-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;margin-bottom:14px;}
.pie-chart-wrap{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.pie-legend{display:flex;flex-direction:column;gap:7px;flex:1;min-width:110px;}
.legend-item{display:flex;align-items:center;gap:7px;font-size:11px;}
.legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.expense-list-section{background:white;border:1px solid var(--border);border-radius:12px;padding:18px;box-shadow:var(--shadow);grid-column:1/-1;}
.expense-table{width:100%;border-collapse:collapse;}
.expense-table th{text-align:left;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;padding:7px 10px;border-bottom:1px solid var(--sand);}
.expense-table td{padding:9px 10px;font-size:12px;border-bottom:1px solid var(--cream);vertical-align:middle;}
.expense-table tr:last-child td{border-bottom:none} .expense-table tr:hover td{background:var(--paper)}
.cat-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:500;}
.amount-cell{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--terracotta);text-align:right;}
.currency-toggle{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);margin-bottom:14px;}
.currency-select{border:1px solid var(--border);border-radius:6px;padding:4px 9px;font-family:'Noto Sans KR',sans-serif;font-size:12px;background:white;outline:none;cursor:pointer;}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
.empty-icon{font-size:44px;margin-bottom:14px;opacity:.4} .empty-text{font-size:14px;font-weight:300}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,14,11,.6);z-index:1000;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:white;border-radius:16px;padding:26px;width:100%;max-width:460px;box-shadow:var(--shadow-lg);animation:modalIn .25s ease;max-height:90vh;overflow-y:auto;}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;margin-bottom:18px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-grid.single{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-group.full{grid-column:1/-1}
.form-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;}
.form-input,.form-select,.form-textarea{border:1px solid var(--border);border-radius:7px;padding:8px 11px;font-family:'Noto Sans KR',sans-serif;font-size:13px;color:var(--ink);background:var(--paper);outline:none;transition:border .2s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--terracotta);background:white;}
.form-textarea{resize:vertical;min-height:65px;}
.modal-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:18px;}
.btn-cancel{background:var(--cream);border:1px solid var(--border);padding:9px 18px;border-radius:7px;font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;}
.btn-cancel:hover{background:var(--sand)}
.btn-save{background:var(--terracotta);color:white;border:none;padding:9px 22px;border-radius:7px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;}
.btn-save:hover{background:var(--terracotta-light)}

/* COVER GRID */
.trip-cover-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:6px;}
.cover-opt{aspect-ratio:1;border-radius:8px;border:2px solid transparent;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--cream);}
.cover-opt:hover{border-color:var(--terracotta);transform:scale(1.05);}
.cover-opt.selected{border-color:var(--terracotta);box-shadow:0 0 0 2px var(--terracotta);}

/* RESPONSIVE */
@media(max-width:768px){
  header{padding:0 14px;height:54px} .logo{font-size:18px;letter-spacing:3px}
  .home-content{padding:16px} .tab-content{padding:14px}
  .timeline{padding-left:50px} .form-grid{grid-template-columns:1fr}
  .category-breakdown{grid-template-columns:1fr} .budget-overview{grid-template-columns:1fr 1fr}
  .res-grid{grid-template-columns:1fr} .home-hero{padding:28px 16px 24px}
  .trip-meta{padding:8px 16px;gap:10px}
}
@media(max-width:480px){
  .budget-overview{grid-template-columns:1fr}
  .expense-table th:nth-child(4),.expense-table td:nth-child(4){display:none}
  .header-center{display:none}
}
::-webkit-scrollbar{width:5px;height:5px} ::-webkit-scrollbar-track{background:var(--cream)} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<header>
  <div class="logo" onclick="goHome()">TRAVEL<span>.</span></div>
  <div class="header-center" id="headerCenter">나의 여행 앨범</div>
  <div class="header-actions" id="headerActions">
    <button class="btn-sm" onclick="openNewTripModal()">＋ 새 여행</button>
  </div>
</header>

<!-- HOME SCREEN -->
<div id="homeScreen">
  <div class="home-hero">
    <div class="home-hero-title">TRAVEL<span>.</span></div>
    <div class="home-hero-sub">나만의 여행 플래너</div>
    <button class="btn-new-trip" onclick="openNewTripModal()">✈ 새 여행 만들기</button>
  </div>
  <div class="home-content">
    <div class="home-section-title">📚 여행 기록</div>
    <div class="trip-list" id="tripList"></div>
  </div>
</div>

<!-- PLANNER SCREEN -->
<div id="plannerScreen">
  <div class="trip-meta">
    <div class="meta-item"><span class="meta-label">🗺</span><span class="meta-value"><input type="text" id="tripDest" placeholder="목적지" oninput="updateTripMeta()"></span></div>
    <div class="meta-item"><span class="meta-label">출발</span><span class="meta-value"><input type="date" id="tripStart" oninput="updateTripMeta()"></span></div>
    <div class="meta-item"><span class="meta-label">귀국</span><span class="meta-value"><input type="date" id="tripEnd" oninput="updateTripMeta()"></span></div>
    <div class="meta-item"><span class="meta-label">👥</span><span class="meta-value"><input type="number" id="tripPeople" placeholder="인원" min="1" style="width:52px" oninput="updateBudgetCards()"></span></div>
  </div>
  <div class="tabs-wrapper">
    <button class="tab-btn active" onclick="switchTab('schedule',this)">🗓 일정표</button>
    <button class="tab-btn" onclick="switchTab('reservation',this)">🎫 예약현황</button>
    <button class="tab-btn" onclick="switchTab('budget',this)">💰 비용계산</button>
  </div>

  <div class="tab-content active" id="tab-schedule">
    <div class="section-header"><span class="section-title">시간별 일정표</span><button class="btn-add" onclick="openScheduleModal()">＋ 일정 추가</button></div>
    <div class="day-tabs" id="dayTabs"></div>
    <div>
      <div class="empty-state" id="scheduleEmpty"><div class="empty-icon">🗺️</div><div class="empty-text">일정이 없습니다.<br>위 버튼으로 추가해보세요!</div></div>
      <div class="timeline" id="timelineList"></div>
    </div>
  </div>

  <div class="tab-content" id="tab-reservation">
    <div class="section-header"><span class="section-title">예약 현황</span><button class="btn-add" onclick="openResModal()">＋ 예약 추가</button></div>
    <div class="res-grid" id="resGrid"></div>
  </div>

  <div class="tab-content" id="tab-budget">
    <div class="section-header"><span class="section-title">비용 계산</span><button class="btn-add" onclick="openExpenseModal()">＋ 지출 추가</button></div>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap;">
      <div class="currency-toggle"><span>통화:</span>
        <select class="currency-select" id="currencySelect" onchange="updateBudgetCards()">
          <option value="KRW">🇰🇷 KRW</option><option value="USD">🇺🇸 USD</option>
          <option value="JPY">🇯🇵 JPY</option><option value="EUR">🇪🇺 EUR</option><option value="THB">🇹🇭 THB</option>
        </select>
      </div>

          <option value="교통">🚌 교통</option><option value="관광">🎡 관광</option><option value="쇼핑">🛍 쇼핑</option><option value="기타">📌 기타</option>

<script>
const TRIPS_KEY='travel_trips_v2';
function loadAllTrips(){try{return JSON.parse(localStorage.getItem(TRIPS_KEY))||[];}catch(e){return[];}}
function saveAllTrips(t){localStorage.setItem(TRIPS_KEY,JSON.stringify(t));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);}
function formatNum(n){if(!n)return'0';return Math.round(n).toLocaleString('ko-KR');}
function getCurrencySymbol(){const m={KRW:'₩',USD:'$',JPY:'¥',EUR:'€',THB:'฿'};return m[document.getElementById('currencySelect').value]||'₩';}

let trips=loadAllTrips();
let currentTripId=null;
let currentTripData=null;
let editingScheduleId=null,editingResId=null,editingExpId=null;

// ── HOME ──
function renderHome(){
  trips=loadAllTrips();
  const list=document.getElementById('tripList');
  if(!trips.length){
    list.innerHTML='<div class="home-empty"><span class="home-empty-icon">🗺️</span><div class="home-empty-text">아직 여행 기록이 없습니다.<br>첫 여행을 만들어보세요!</div></div>';
    return;
  }
  const sorted=[...trips].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  list.innerHTML=sorted.map(t=>{
    const dateStr=t.start&&t.end?t.start+' ~ '+t.end:t.start||'날짜 미정';
    const days=t.start&&t.end?Math.round((new Date(t.end)-new Date(t.start))/86400000)+1:null;
    const expTotal=(t.expenses||[]).reduce((a,e)=>a+e.amount,0);
    const schedCount=(t.days||[]).reduce((a,d)=>a+(d.items||[]).length,0);
    return '<div class="trip-item" onclick="openTrip(\''+t.id+'\')">'+
      '<div class="trip-thumb">'+(t.emoji||'✈️')+'</div>'+
      '<div class="trip-info">'+
        '<div class="trip-item-title">'+(t.title||t.dest||'새 여행')+'</div>'+
        '<div class="trip-item-meta">'+
          '<span>📅 '+dateStr+'</span>'+
          (days?'<span>🌙 '+days+'일</span>':'')+
          (t.dest?'<span>📍 '+t.dest+'</span>':'')+
          (expTotal?'<span>💳 ₩'+formatNum(expTotal)+'</span>':'')+
        '</div>'+
        '<div style="margin-top:5px;display:flex;gap:5px;flex-wrap:wrap">'+
          '<span class="trip-item-badge">🗓 일정 '+schedCount+'개</span>'+
          '<span class="trip-item-badge">🎫 예약 '+(t.reservations||[]).length+'개</span>'+
        '</div>'+
      '</div>'+
      '<div class="trip-item-actions" onclick="event.stopPropagation()">'+
        '<button class="btn-icon-sm" onclick="duplicateTrip(\''+t.id+'\')" title="복사">📋</button>'+
        '<button class="btn-icon-sm del" onclick="deleteTrip(\''+t.id+'\')" title="삭제">🗑</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

function goHome(){
  if(currentTripId)saveCurrentTrip();
  currentTripId=null;currentTripData=null;
  document.getElementById('homeScreen').style.display='block';
  document.getElementById('plannerScreen').style.display='none';
  document.getElementById('headerCenter').textContent='나의 여행 앨범';
  document.getElementById('headerActions').innerHTML='<button class="btn-sm" onclick="openNewTripModal()">＋ 새 여행</button>';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.querySelectorAll('.tab-content').forEach((c,i)=>c.classList.toggle('active',i===0));
  renderHome();
}

// ── NEW TRIP ──
let selectedEmoji='✈️';
function openNewTripModal(){
  ['ntTitle','ntStart','ntEnd','ntDest'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('ntPeople').value='1';
  selectedEmoji='✈️';
  document.querySelectorAll('.cover-opt').forEach(el=>el.classList.toggle('selected',el.dataset.emoji==='✈️'));
  document.getElementById('newTripModal').classList.add('open');
}
document.getElementById('coverGrid').addEventListener('click',e=>{
  const opt=e.target.closest('.cover-opt');if(!opt)return;
  document.querySelectorAll('.cover-opt').forEach(el=>el.classList.remove('selected'));
  opt.classList.add('selected');selectedEmoji=opt.dataset.emoji;
});
function createTrip(){
  const title=document.getElementById('ntTitle').value.trim();
  const dest=document.getElementById('ntDest').value.trim();
  if(!title&&!dest){alert('여행 제목 또는 목적지를 입력해주세요.');return;}
  const start=document.getElementById('ntStart').value;
  const end=document.getElementById('ntEnd').value;
  let dayCount=1;
  if(start&&end){const diff=Math.round((new Date(end)-new Date(start))/86400000);if(diff>0)dayCount=diff+1;}
  const days=Array.from({length:dayCount},(_,i)=>({label:'Day '+(i+1),items:[]}));
  const trip={id:uid(),title:title||dest,dest,start,end,people:parseInt(document.getElementById('ntPeople').value)||1,emoji:selectedEmoji,days,reservations:[],expenses:[],budget:'',currency:'KRW',createdAt:Date.now()};
  trips.push(trip);saveAllTrips(trips);
  closeModal('newTripModal');openTrip(trip.id);
}
function deleteTrip(id){
  if(!confirm('이 여행을 삭제할까요?'))return;
  trips=trips.filter(t=>t.id!==id);saveAllTrips(trips);renderHome();
}
function duplicateTrip(id){
  const orig=trips.find(t=>t.id===id);if(!orig)return;
  const copy=JSON.parse(JSON.stringify(orig));copy.id=uid();copy.title=copy.title+' (복사)';copy.createdAt=Date.now();
  trips.push(copy);saveAllTrips(trips);renderHome();
}

// ── OPEN TRIP ──
function openTrip(id){
  if(currentTripId)saveCurrentTrip();
  const trip=trips.find(t=>t.id===id);if(!trip)return;
  currentTripId=id;
  currentTripData=JSON.parse(JSON.stringify(trip));
  currentTripData.currentDay=0;
  document.getElementById('tripDest').value=trip.dest||'';
  document.getElementById('tripStart').value=trip.start||'';
  document.getElementById('tripEnd').value=trip.end||'';
  document.getElementById('tripPeople').value=trip.people||1;
  document.getElementById('totalBudget').value=trip.budget||'';
  document.getElementById('currencySelect').value=trip.currency||'KRW';
  document.getElementById('homeScreen').style.display='none';
  document.getElementById('plannerScreen').style.display='block';
  document.getElementById('headerCenter').textContent=(trip.emoji||'✈️')+' '+(trip.title||trip.dest);
  document.getElementById('headerActions').innerHTML='<button class="btn-sm ghost" onclick="goHome()">← 목록</button><button class="btn-sm" onclick="exportData()">💾 백업</button>';
  renderDayTabs();renderTimeline();renderReservations();updateBudgetCards();
}
function saveCurrentTrip(){
  if(!currentTripId||!currentTripData)return;
  const idx=trips.findIndex(t=>t.id===currentTripId);if(idx===-1)return;
  trips[idx]=Object.assign({},trips[idx],{
    dest:document.getElementById('tripDest').value,
    start:document.getElementById('tripStart').value,
    end:document.getElementById('tripEnd').value,
    people:parseInt(document.getElementById('tripPeople').value)||1,
    budget:document.getElementById('totalBudget').value,
    currency:document.getElementById('currencySelect').value,
    days:currentTripData.days,
    reservations:currentTripData.reservations,
    expenses:currentTripData.expenses,
  });
  saveAllTrips(trips);showSaveToast();
}
['tripDest','tripStart','tripEnd','tripPeople','totalBudget','currencySelect'].forEach(id=>{
  document.getElementById(id)?.addEventListener('change',()=>{if(currentTripId)saveCurrentTrip();});
});

// ── TABS ──
function switchTab(name,btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');btn.classList.add('active');
  if(name==='budget')updateBudgetCards();
}
function updateTripMeta(){
  if(!currentTripData)return;
  const dest=document.getElementById('tripDest').value;
  document.getElementById('headerCenter').textContent=(currentTripData.emoji||'✈️')+' '+(dest||'새 여행');
  const s=document.getElementById('tripStart').value,e=document.getElementById('tripEnd').value;
  if(s&&e){
    const diff=Math.round((new Date(e)-new Date(s))/86400000)+1;
    while(currentTripData.days.length<diff)currentTripData.days.push({label:'Day '+currentTripData.days.length+1,items:[]});
    renderDayTabs();
  }
  if(currentTripId)saveCurrentTrip();
}

// ── DAY TABS ──
function renderDayTabs(){
  if(!currentTripData)return;
  const wrap=document.getElementById('dayTabs');
  const s=document.getElementById('tripStart').value;
  let html=currentTripData.days.map((d,i)=>{
    let sub='';
    if(s){const dt=new Date(s);dt.setDate(dt.getDate()+i);sub=' ('+(dt.getMonth()+1)+'/'+dt.getDate()+')';}
    return '<button class="day-tab'+(i===currentTripData.currentDay?' active':'')+'" onclick="switchDay('+i+',this)">'+d.label+sub+'</button>';
  }).join('');
  html+='<button class="btn-day-add" onclick="addDay()">＋ Day</button>';
  wrap.innerHTML=html;
}
function switchDay(i,btn){
  currentTripData.currentDay=i;
  document.querySelectorAll('.day-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderTimeline();
}
function addDay(){
  if(!currentTripData)return;
  currentTripData.days.push({label:'Day '+(currentTripData.days.length+1),items:[]});
  renderDayTabs();saveCurrentTrip();
}

// ── SCHEDULE ──
const typeMap={activity:{label:'관광',cls:'badge-activity',icon:'🎡'},meal:{label:'식사',cls:'badge-meal',icon:'🍜'},transport:{label:'이동',cls:'badge-transport',icon:'🚌'},hotel:{label:'숙박',cls:'badge-hotel',icon:'🏨'},etc:{label:'기타',cls:'badge-etc',icon:'📌'}};
function openScheduleModal(id){
  editingScheduleId=id||null;
  document.getElementById('scheduleModalTitle').textContent=id?'일정 수정':'일정 추가';
  if(id){
    const item=currentTripData.days[currentTripData.currentDay].items.find(x=>x.id===id);
    if(item){document.getElementById('sTime').value=item.startTime;document.getElementById('eTime').value=item.endTime;document.getElementById('sTitle').value=item.title;document.getElementById('sType').value=item.type;document.getElementById('sCost').value=item.cost||'';document.getElementById('sLocation').value=item.location||'';document.getElementById('sMemo').value=item.memo||'';}
  }else{document.getElementById('sTime').value='09:00';document.getElementById('eTime').value='10:00';document.getElementById('sTitle').value='';document.getElementById('sType').value='activity';document.getElementById('sCost').value='';document.getElementById('sLocation').value='';document.getElementById('sMemo').value='';}
  document.getElementById('scheduleModal').classList.add('open');
}
function saveSchedule(){
  const title=document.getElementById('sTitle').value.trim();if(!title){alert('제목을 입력해주세요.');return;}
  const item={id:editingScheduleId||uid(),startTime:document.getElementById('sTime').value,endTime:document.getElementById('eTime').value,title,type:document.getElementById('sType').value,cost:parseFloat(document.getElementById('sCost').value)||0,location:document.getElementById('sLocation').value,memo:document.getElementById('sMemo').value};
  const items=currentTripData.days[currentTripData.currentDay].items;
  if(editingScheduleId){const idx=items.findIndex(x=>x.id===editingScheduleId);if(idx!==-1)items[idx]=item;}else items.push(item);
  items.sort((a,b)=>a.startTime.localeCompare(b.startTime));
  closeModal('scheduleModal');renderTimeline();saveCurrentTrip();
}
function deleteSchedule(id){
  if(!confirm('삭제할까요?'))return;
  currentTripData.days[currentTripData.currentDay].items=currentTripData.days[currentTripData.currentDay].items.filter(x=>x.id!==id);
  renderTimeline();saveCurrentTrip();
}
function renderTimeline(){
  if(!currentTripData)return;
  const items=currentTripData.days[currentTripData.currentDay]?.items||[];
  const container=document.getElementById('timelineList');
  const empty=document.getElementById('scheduleEmpty');
  if(!items.length){container.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  container.innerHTML=items.map(item=>{
    const t=typeMap[item.type]||typeMap.etc;
    return '<div class="timeline-item">'+
      '<div class="timeline-time">'+item.startTime+'<br><span style="color:var(--border)">↓</span><br>'+item.endTime+'</div>'+
      '<div class="timeline-dot"></div>'+
      '<div class="timeline-card"><div class="timeline-card-top">'+
        '<div><div class="timeline-card-title">'+t.icon+' '+item.title+'</div>'+
        '<div class="timeline-card-sub">'+
          (item.location?'<span>📍 '+item.location+'</span>':'')+
          (item.cost?'<span>💳 '+getCurrencySymbol()+formatNum(item.cost)+'</span>':'')+
          (item.memo?'<span>📝 '+item.memo+'</span>':'')+
        '</div></div>'+
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">'+
          '<span class="timeline-badge '+t.cls+'">'+t.label+'</span>'+
          '<div class="card-actions">'+
            '<button class="btn-icon" onclick="openScheduleModal(\''+item.id+'\')">✏️</button>'+
            '<button class="btn-icon del" onclick="deleteSchedule(\''+item.id+'\')">🗑</button>'+
          '</div></div>'+
      '</div></div></div>';
  }).join('');
}

// ── RESERVATION ──
const resTypeMap={flight:{label:'항공',icon:'✈️',cls:'flight'},hotel:{label:'숙소',icon:'🏨',cls:'hotel'},tour:{label:'투어',icon:'🎡',cls:'tour'},car:{label:'렌터카',icon:'🚗',cls:'car'},other:{label:'기타',icon:'📌',cls:'other'}};
const statusMap={confirmed:{label:'확정',cls:'status-confirmed',icon:'✅'},pending:{label:'대기중',cls:'status-pending',icon:'⏳'},cancelled:{label:'취소됨',cls:'status-cancelled',icon:'❌'}};
function openResModal(id){
  editingResId=id||null;
  if(id){const r=currentTripData.reservations.find(x=>x.id===id);if(r){document.getElementById('rType').value=r.type;document.getElementById('rName').value=r.name;document.getElementById('rDateIn').value=r.dateIn;document.getElementById('rDateOut').value=r.dateOut;document.getElementById('rTimeIn').value=r.timeIn;document.getElementById('rTimeOut').value=r.timeOut;document.getElementById('rConfirm').value=r.confirm;document.getElementById('rCost').value=r.cost||'';document.getElementById('rStatus').value=r.status;document.getElementById('rMemo').value=r.memo||'';}}
  else{['rName','rDateIn','rDateOut','rTimeIn','rTimeOut','rConfirm','rCost','rMemo'].forEach(id=>document.getElementById(id).value='');document.getElementById('rType').value='flight';document.getElementById('rStatus').value='confirmed';}
  document.getElementById('resModal').classList.add('open');
}
function saveReservation(){
  const name=document.getElementById('rName').value.trim();if(!name){alert('예약명을 입력해주세요.');return;}
  const r={id:editingResId||uid(),type:document.getElementById('rType').value,name,dateIn:document.getElementById('rDateIn').value,dateOut:document.getElementById('rDateOut').value,timeIn:document.getElementById('rTimeIn').value,timeOut:document.getElementById('rTimeOut').value,confirm:document.getElementById('rConfirm').value,cost:parseFloat(document.getElementById('rCost').value)||0,status:document.getElementById('rStatus').value,memo:document.getElementById('rMemo').value};
  if(editingResId){const idx=currentTripData.reservations.findIndex(x=>x.id===editingResId);if(idx!==-1)currentTripData.reservations[idx]=r;}else currentTripData.reservations.push(r);
  closeModal('resModal');renderReservations();saveCurrentTrip();
}
function deleteReservation(id){
  if(!confirm('삭제할까요?'))return;
  currentTripData.reservations=currentTripData.reservations.filter(x=>x.id!==id);
  renderReservations();saveCurrentTrip();
}
function renderReservations(){
  if(!currentTripData)return;
  const grid=document.getElementById('resGrid');
  if(!currentTripData.reservations.length){grid.innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🎫</div><div class="empty-text">예약이 없습니다</div></div>';return;}
  const currency=getCurrencySymbol();
  grid.innerHTML=[...currentTripData.reservations].sort((a,b)=>(a.dateIn||'').localeCompare(b.dateIn||'')).map(r=>{
    const t=resTypeMap[r.type]||resTypeMap.other;const s=statusMap[r.status]||statusMap.confirmed;
    return '<div class="res-card"><div class="res-card-header"><div class="res-icon '+t.cls+'">'+t.icon+'</div><div><div class="res-card-type">'+t.label+'</div><div class="res-card-name">'+r.name+'</div></div><div style="margin-left:auto;display:flex;gap:4px"><button class="btn-icon" onclick="openResModal(\''+r.id+'\')">✏️</button><button class="btn-icon del" onclick="deleteReservation(\''+r.id+'\')">🗑</button></div></div><div class="res-card-body">'+
      (r.dateIn?'<div class="res-row"><span class="res-row-label">'+(r.type==='hotel'?'체크인':'날짜')+'</span><span class="res-row-value">'+r.dateIn+(r.timeIn?' '+r.timeIn:'')+'</span></div>':'')+
      (r.dateOut?'<div class="res-row"><span class="res-row-label">'+(r.type==='hotel'?'체크아웃':'도착')+'</span><span class="res-row-value">'+r.dateOut+(r.timeOut?' '+r.timeOut:'')+'</span></div>':'')+
      (r.confirm?'<div class="res-row"><span class="res-row-label">예약번호</span><span class="res-row-value" style="font-family:DM Mono,monospace">'+r.confirm+'</span></div>':'')+
      (r.memo?'<div class="res-row"><span class="res-row-label">메모</span><span class="res-row-value" style="font-size:11px;color:var(--muted)">'+r.memo+'</span></div>':'')+
      '</div><div class="res-card-footer"><span class="res-status '+s.cls+'">'+s.icon+' '+s.label+'</span><span class="res-cost">'+(r.cost?currency+formatNum(r.cost):'—')+'</span></div></div>';
  }).join('');
}

// ── EXPENSE ──
const catColors={'항공':'#4a8aaa','숙박':'#9c6cc0','식비':'#e8845f','교통':'#5ba87a','관광':'#d4a83a','쇼핑':'#c9623f','기타':'#8a8070'};
const catIcons={'항공':'✈️','숙박':'🏨','식비':'🍜','교통':'🚌','관광':'🎡','쇼핑':'🛍','기타':'📌'};
function openExpenseModal(id){
  editingExpId=id||null;
  if(id){const e=currentTripData.expenses.find(x=>x.id===id);if(e){document.getElementById('expTitle').value=e.title;document.getElementById('expCat').value=e.cat;document.getElementById('expDate').value=e.date;document.getElementById('expAmount').value=e.amount;document.getElementById('expPay').value=e.pay;document.getElementById('expMemo').value=e.memo||'';}}
  else{document.getElementById('expTitle').value='';document.getElementById('expCat').value='식비';document.getElementById('expDate').value='';document.getElementById('expAmount').value='';document.getElementById('expPay').value='카드';document.getElementById('expMemo').value='';}
  document.getElementById('expenseModal').classList.add('open');
}
function saveExpense(){
  const title=document.getElementById('expTitle').value.trim();const amount=parseFloat(document.getElementById('expAmount').value);
  if(!title){alert('항목명을 입력해주세요.');return;}if(!amount){alert('금액을 입력해주세요.');return;}
  const e={id:editingExpId||uid(),title,cat:document.getElementById('expCat').value,date:document.getElementById('expDate').value,amount,pay:document.getElementById('expPay').value,memo:document.getElementById('expMemo').value};
  if(editingExpId){const idx=currentTripData.expenses.findIndex(x=>x.id===editingExpId);if(idx!==-1)currentTripData.expenses[idx]=e;}else currentTripData.expenses.push(e);
  closeModal('expenseModal');updateBudgetCards();saveCurrentTrip();
}
function deleteExpense(id){
  if(!confirm('삭제할까요?'))return;
  currentTripData.expenses=currentTripData.expenses.filter(x=>x.id!==id);
  updateBudgetCards();saveCurrentTrip();
}
function updateBudgetCards(){
  if(!currentTripData)return;
  const currency=getCurrencySymbol();
  const budget=parseFloat(document.getElementById('totalBudget').value)||0;
  const spent=currentTripData.expenses.reduce((a,e)=>a+e.amount,0);
  const people=parseInt(document.getElementById('tripPeople').value)||1;
  const s=document.getElementById('tripStart').value,en=document.getElementById('tripEnd').value;
  let days=1;if(s&&en){const d=Math.round((new Date(en)-new Date(s))/86400000);if(d>0)days=d+1;}
  document.getElementById('totalBudgetDisplay').textContent=budget?currency+formatNum(budget):'—';
  document.getElementById('totalSpentDisplay').textContent=currency+formatNum(spent);
  document.getElementById('remainingDisplay').textContent=budget?currency+formatNum(budget-spent):'—';
  document.getElementById('perPersonDisplay').textContent=currency+formatNum(spent/people);
  document.getElementById('perDayDisplay').textContent='일당 '+currency+formatNum(spent/days);
  const pct=budget?Math.min((spent/budget)*100,100):0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('spentPercent').textContent=budget?'예산 대비 '+Math.round(pct)+'%':'예산 미설정';
  renderPieChart();renderExpenseTable();
}
function renderPieChart(){
  if(!currentTripData)return;
  const catTotals={};
  currentTripData.expenses.forEach(e=>{catTotals[e.cat]=(catTotals[e.cat]||0)+e.amount;});
  const total=Object.values(catTotals).reduce((a,b)=>a+b,0);
  const svg=document.getElementById('pieChart');const legend=document.getElementById('pieLegend');
  if(!total){svg.innerHTML='<circle cx="60" cy="60" r="50" fill="var(--sand)"/><text x="60" y="65" text-anchor="middle" font-size="10" fill="var(--muted)">없음</text>';legend.innerHTML='<div style="color:var(--muted);font-size:12px">지출 추가 후<br>표시됩니다</div>';return;}
  const cx=60,cy=60,r=50;let paths='',startAngle=-Math.PI/2;
  const entries=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  entries.forEach(([cat,val])=>{const angle=(val/total)*2*Math.PI,ea=startAngle+angle,x1=cx+r*Math.cos(startAngle),y1=cy+r*Math.sin(startAngle),x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea),large=angle>Math.PI?1:0,color=catColors[cat]||'#aaa';paths+='<path d="M'+cx+','+cy+' L'+x1+','+y1+' A'+r+','+r+',0,'+large+',1,'+x2+','+y2+'Z" fill="'+color+'" stroke="white" stroke-width="2"/>';startAngle=ea;});
  paths+='<circle cx="'+cx+'" cy="'+cy+'" r="26" fill="white"/>';
  const pct=Math.round((entries[0][1]/total)*100);
  paths+='<text x="'+cx+'" y="'+(cy-3)+'" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--ink)">'+pct+'%</text><text x="'+cx+'" y="'+(cy+10)+'" text-anchor="middle" font-size="8" fill="var(--muted)">'+entries[0][0]+'</text>';
  svg.innerHTML=paths;
  const currency=getCurrencySymbol();
  legend.innerHTML=entries.map(([cat,val])=>'<div class="legend-item"><div class="legend-dot" style="background:'+(catColors[cat]||'#aaa')+'"></div><span>'+(catIcons[cat]||'📌')+' '+cat+'</span><span style="margin-left:auto;font-family:DM Mono,monospace;font-size:10px;color:var(--muted)">'+currency+formatNum(val)+'</span></div>').join('');
}
function renderExpenseTable(){
  if(!currentTripData)return;
  const filter=document.getElementById('filterCat').value;
  const list=currentTripData.expenses.filter(e=>!filter||e.cat===filter).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const currency=getCurrencySymbol();
  const tbody=document.getElementById('expenseTableBody');
  if(!list.length){tbody.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:24px">내역 없음</td></tr>';return;}
  tbody.innerHTML=list.map(e=>'<tr><td style="color:var(--muted);font-size:11px">'+(e.date||'—')+'</td><td style="font-weight:500">'+e.title+'</td><td><span class="cat-badge" style="background:'+(catColors[e.cat]||'#eee')+'22;color:'+(catColors[e.cat]||'#666')+'">'+(catIcons[e.cat]||'📌')+' '+e.cat+'</span></td><td style="color:var(--muted);font-size:11px">'+e.pay+'</td><td class="amount-cell">'+currency+formatNum(e.amount)+'</td><td><div style="display:flex;gap:3px;justify-content:flex-end"><button class="btn-icon" onclick="openExpenseModal(\''+e.id+'\')">✏️</button><button class="btn-icon del" onclick="deleteExpense(\''+e.id+'\')">🗑</button></div></td></tr>').join('');
}

// ── UTILS ──
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)closeModal(el.id);});});
function showSaveToast(){
  let t=document.getElementById('saveToast');
  if(!t){t=document.createElement('div');t.id='saveToast';t.style.cssText='position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:white;padding:9px 20px;border-radius:30px;font-size:12px;font-family:Noto Sans KR,sans-serif;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;';document.body.appendChild(t);}
  t.textContent='✅ 자동 저장됨';t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>{t.style.opacity='0';},1600);
}
function exportData(){
  if(currentTripId)saveCurrentTrip();
  const trip=trips.find(t=>t.id===currentTripId);if(!trip)return;
  const blob=new Blob([JSON.stringify(trip,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=(trip.title||'travel')+'-backup.json';a.click();URL.revokeObjectURL(a.href);
}

renderHome();
