<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOYAGE — 여행 플래너</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0f0e0b;
  --paper: #faf8f3;
  --cream: #f2ede3;
  --sand: #e8dfc8;
  --terracotta: #c9623f;
  --terracotta-light: #e8845f;
  --ocean: #2a5c7a;
  --ocean-light: #4a8aaa;
  --gold: #c9a84c;
  --muted: #8a8070;
  --border: #d4c9b0;
  --white: #ffffff;
  --shadow: 0 4px 24px rgba(15,14,11,0.10);
  --shadow-lg: 0 12px 48px rgba(15,14,11,0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
header {
  background: var(--ink);
  color: var(--paper);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,0.3);
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-weight: 900;
  letter-spacing: 4px;
  color: var(--gold);
}

.trip-title-header {
  font-size: 13px;
  font-weight: 300;
  color: var(--sand);
  letter-spacing: 1px;
}

.header-actions {
  display: flex;
  gap: 10px;
  align-items: center;
}

.btn-sm {
  background: var(--terracotta);
  color: white;
  border: none;
  padding: 7px 16px;
  border-radius: 4px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-sm:hover { background: var(--terracotta-light); }

/* ── TRIP META BAR ── */
.trip-meta {
  background: var(--cream);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  gap: 24px;
  align-items: center;
  flex-wrap: wrap;
}

.meta-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.meta-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.meta-value {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
}

.meta-value input {
  background: transparent;
  border: none;
  border-bottom: 1px dashed var(--border);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  width: 140px;
  outline: none;
  padding: 2px 0;
}

/* ── TABS ── */
.tabs-wrapper {
  background: var(--ink);
  padding: 0 24px;
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs-wrapper::-webkit-scrollbar { display: none; }

.tab-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 14px 22px;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 7px;
  letter-spacing: 0.3px;
}

.tab-btn:hover { color: var(--sand); }
.tab-btn.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}

.tab-icon { font-size: 15px; }

/* ── MAIN CONTENT ── */
.tab-content { display: none; padding: 24px; max-width: 1200px; margin: 0 auto; }
.tab-content.active { display: block; }

/* ── SECTION HEADERS ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--sand);
}

.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
}

.btn-add {
  background: var(--terracotta);
  color: white;
  border: none;
  padding: 9px 18px;
  border-radius: 6px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-add:hover { background: var(--terracotta-light); transform: translateY(-1px); }

/* ── DAY TABS ── */
.day-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.day-tab {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 30px;
  padding: 7px 18px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--muted);
}
.day-tab:hover { border-color: var(--terracotta); color: var(--terracotta); }
.day-tab.active {
  background: var(--terracotta);
  border-color: var(--terracotta);
  color: white;
}

.btn-day-add {
  background: transparent;
  border: 1px dashed var(--border);
  border-radius: 30px;
  padding: 7px 18px;
  font-size: 13px;
  cursor: pointer;
  color: var(--muted);
  transition: all 0.2s;
}
.btn-day-add:hover { border-color: var(--terracotta); color: var(--terracotta); }

/* ── TIMELINE ── */
.timeline {
  position: relative;
  padding-left: 60px;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 28px;
  top: 12px;
  bottom: 12px;
  width: 2px;
  background: linear-gradient(to bottom, var(--terracotta), var(--ocean));
  border-radius: 2px;
}

.timeline-item {
  position: relative;
  margin-bottom: 16px;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}

.timeline-dot {
  position: absolute;
  left: -38px;
  top: 16px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--terracotta);
  border: 3px solid var(--paper);
  box-shadow: 0 0 0 2px var(--terracotta);
}

.timeline-time {
  position: absolute;
  left: -58px;
  top: 13px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  text-align: right;
  width: 44px;
  transform: translateX(-100%);
  margin-left: -8px;
}

.timeline-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  box-shadow: var(--shadow);
  transition: all 0.2s;
  cursor: default;
}
.timeline-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }

.timeline-card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
}

.timeline-card-info { flex: 1; }

.timeline-card-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 4px;
}

.timeline-card-sub {
  font-size: 12px;
  color: var(--muted);
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.timeline-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  flex-shrink: 0;
}
.badge-activity { background: #e8f5e9; color: #2e7d32; }
.badge-meal { background: #fff3e0; color: #e65100; }
.badge-transport { background: #e3f2fd; color: #1565c0; }
.badge-hotel { background: #f3e5f5; color: #6a1b9a; }
.badge-etc { background: #f5f5f5; color: #616161; }

.card-actions {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.2s;
}
.timeline-card:hover .card-actions { opacity: 1; }

.btn-icon {
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  width: 28px;
  height: 28px;
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  color: var(--muted);
}
.btn-icon:hover { background: var(--cream); color: var(--ink); }
.btn-icon.del:hover { background: #fee; color: #c00; border-color: #fcc; }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,14,11,0.6);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }

.modal {
  background: white;
  border-radius: 16px;
  padding: 28px;
  width: 100%;
  max-width: 480px;
  box-shadow: var(--shadow-lg);
  animation: modalIn 0.25s ease;
  max-height: 90vh;
  overflow-y: auto;
}

@keyframes modalIn {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 20px;
  color: var(--ink);
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 14px;
}
.form-grid.single { grid-template-columns: 1fr; }

.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1 / -1; }

.form-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.form-input, .form-select, .form-textarea {
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 9px 12px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  color: var(--ink);
  background: var(--paper);
  outline: none;
  transition: border 0.2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--terracotta);
  background: white;
}
.form-textarea { resize: vertical; min-height: 70px; }

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 20px;
}

.btn-cancel {
  background: var(--cream);
  border: 1px solid var(--border);
  padding: 10px 20px;
  border-radius: 7px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--ink);
}
.btn-cancel:hover { background: var(--sand); }

.btn-save {
  background: var(--terracotta);
  color: white;
  border: none;
  padding: 10px 24px;
  border-radius: 7px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-save:hover { background: var(--terracotta-light); }

/* ── RESERVATION TAB ── */
.res-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.res-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: all 0.2s;
}
.res-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }

.res-card-header {
  padding: 14px 16px 10px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--cream);
}

.res-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.res-icon.flight { background: #e3f2fd; }
.res-icon.hotel { background: #f3e5f5; }
.res-icon.tour { background: #e8f5e9; }
.res-icon.car { background: #fff3e0; }
.res-icon.other { background: #f5f5f5; }

.res-card-type {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 2px;
}

.res-card-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
}

.res-card-body {
  padding: 12px 16px;
}

.res-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 13px;
}

.res-row-label { color: var(--muted); }
.res-row-value { font-weight: 500; color: var(--ink); }

.res-card-footer {
  padding: 10px 16px;
  background: var(--cream);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.res-status {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 20px;
}
.status-confirmed { background: #e8f5e9; color: #2e7d32; }
.status-pending { background: #fff3e0; color: #e65100; }
.status-cancelled { background: #ffebee; color: #c62828; }

.res-cost {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  color: var(--terracotta);
}

/* ── BUDGET TAB ── */
.budget-overview {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}

.budget-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

.budget-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.budget-card.total::before { background: var(--gold); }
.budget-card.spent::before { background: var(--terracotta); }
.budget-card.remaining::before { background: var(--ocean); }
.budget-card.per-day::before { background: #66bb6a; }

.budget-card-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 8px;
}

.budget-card-amount {
  font-family: 'DM Mono', monospace;
  font-size: 22px;
  font-weight: 500;
  color: var(--ink);
}

.budget-card-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}

.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--sand);
  border-radius: 3px;
  margin-top: 10px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(to right, var(--terracotta), var(--terracotta-light));
  transition: width 0.6s ease;
}

/* Category breakdown */
.category-breakdown {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 28px;
}

.pie-section {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  box-shadow: var(--shadow);
}

.pie-title {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--ink);
}

.pie-chart-wrap {
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
}

.pie-svg { flex-shrink: 0; }

.pie-legend {
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
  min-width: 120px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}

.expense-list-section {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  box-shadow: var(--shadow);
  grid-column: 1 / -1;
}

.expense-table {
  width: 100%;
  border-collapse: collapse;
}

.expense-table th {
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--sand);
}

.expense-table td {
  padding: 10px 12px;
  font-size: 13px;
  border-bottom: 1px solid var(--cream);
  vertical-align: middle;
}

.expense-table tr:last-child td { border-bottom: none; }
.expense-table tr:hover td { background: var(--paper); }

.cat-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 9px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 500;
}

.amount-cell {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  color: var(--terracotta);
  text-align: right;
}

.currency-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 16px;
}

.currency-select {
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 10px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px;
  background: white;
  outline: none;
  cursor: pointer;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}

.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-text { font-size: 15px; font-weight: 300; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  header { padding: 0 16px; height: 56px; }
  .logo { font-size: 20px; }
  .trip-title-header { display: none; }
  .trip-meta { padding: 10px 16px; gap: 12px; }
  .tabs-wrapper { padding: 0 16px; }
  .tab-btn { padding: 12px 14px; font-size: 12px; }
  .tab-content { padding: 16px; }
  .timeline { padding-left: 52px; }
  .timeline-time { font-size: 10px; }
  .form-grid { grid-template-columns: 1fr; }
  .category-breakdown { grid-template-columns: 1fr; }
  .budget-overview { grid-template-columns: 1fr 1fr; }
  .res-grid { grid-template-columns: 1fr; }
  .section-title { font-size: 18px; }
  .pie-chart-wrap { flex-direction: column; align-items: flex-start; }
  .day-tabs { gap: 6px; }
  .day-tab { padding: 6px 14px; font-size: 12px; }
}

@media (max-width: 480px) {
  .budget-overview { grid-template-columns: 1fr; }
  .budget-card-amount { font-size: 18px; }
  .expense-table th:nth-child(3), .expense-table td:nth-child(3) { display: none; }
}

/* ── TOOLTIP ── */
[data-tooltip] { position: relative; }
[data-tooltip]::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: white;
  padding: 4px 10px;
  border-radius: 5px;
  font-size: 11px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
[data-tooltip]:hover::after { opacity: 1; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--cream); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">VOYAGE</div>
  <div class="trip-title-header" id="headerTripName">✈ 나의 여행 플래너</div>
  <div class="header-actions">
    <button class="btn-sm" onclick="exportData()">💾 저장</button>
  </div>
</header>

<!-- TRIP META -->
<div class="trip-meta">
  <div class="meta-item">
    <span class="meta-label">🗺 여행지</span>
    <span class="meta-value"><input type="text" id="tripDest" placeholder="목적지 입력" oninput="updateTripMeta()"></span>
  </div>
  <div class="meta-item">
    <span class="meta-label">📅 출발</span>
    <span class="meta-value"><input type="date" id="tripStart" oninput="updateTripMeta()"></span>
  </div>
  <div class="meta-item">
    <span class="meta-label">📅 귀국</span>
    <span class="meta-value"><input type="date" id="tripEnd" oninput="updateTripMeta()"></span>
  </div>
  <div class="meta-item">
    <span class="meta-label">👥 인원</span>
    <span class="meta-value"><input type="number" id="tripPeople" placeholder="명" min="1" style="width:60px" oninput="updateBudgetCards()"></span>
  </div>
</div>

<!-- TABS -->
<div class="tabs-wrapper">

  </button>
  <button class="tab-btn" onclick="switchTab('reservation',this)">

  </button>
  <button class="tab-btn" onclick="switchTab('budget',this)">

<!-- ════════════════════════════════════════
     TAB 1: SCHEDULE
════════════════════════════════════════ -->

    </div>
    <div class="timeline" id="timelineList"></div>
  </div>
</div>

<!-- ════════════════════════════════════════
     TAB 2: RESERVATION
════════════════════════════════════════ -->
<div class="tab-content" id="tab-reservation">
  <div class="section-header">
    <span class="section-title">예약 현황</span>

<!-- ════════════════════════════════════════
     TAB 3: BUDGET
════════════════════════════════════════ -->

  <div class="section-header">
    <span class="section-title">비용 계산</span>

  <div style="display:flex; align-items:center; gap:16px; margin-bottom:20px; flex-wrap:wrap;">
    <div class="currency-toggle">
      <span>통화:</span>
      <select class="currency-select" id="currencySelect" onchange="updateBudgetCards()">

        <option value="USD">🇺🇸 USD ($)</option>
        <option value="JPY">🇯🇵 JPY (¥)</option>
        <option value="EUR">🇪🇺 EUR (€)</option>

  <!-- Overview Cards -->

    <div class="budget-card remaining">

  <!-- Category & Table -->

<script>
// ── STATE ──
let state = {
  days: [{ label: 'Day 1', items: [] }],
  currentDay: 0,
  reservations: [],
  expenses: [],
};

let editingScheduleId = null;
let editingResId = null;
let editingExpId = null;

function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }

// ── TABS ──
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'budget') updateBudgetCards();
}

// ── TRIP META ──
function updateTripMeta() {
  const dest = document.getElementById('tripDest').value;
  document.getElementById('headerTripName').textContent = dest ? `✈ ${dest}` : '✈ 나의 여행 플래너';
  generateDaysFromDates();
}

function generateDaysFromDates() {
  const start = document.getElementById('tripStart').value;
  const end = document.getElementById('tripEnd').value;
  if (!start || !end) return;
  const s = new Date(start), e = new Date(end);
  if (e < s) return;
  const days = Math.round((e - s) / 86400000) + 1;
  const currentCount = state.days.length;
  while (state.days.length < days) {
    state.days.push({ label: `Day ${state.days.length + 1}`, items: [] });
  }
  renderDayTabs();
}

// ── DAY TABS ──
function renderDayTabs() {
  const wrap = document.getElementById('dayTabs');
  let html = '';
  state.days.forEach((d, i) => {
    const start = document.getElementById('tripStart').value;
    let sub = '';
    if (start) {
      const dt = new Date(start);
      dt.setDate(dt.getDate() + i);
      sub = ` (${dt.getMonth()+1}/${dt.getDate()})`;
    }
    html += `<button class="day-tab ${i === state.currentDay ? 'active' : ''}" data-day="${i}" onclick="switchDay(${i},this)">${d.label}${sub}</button>`;
  });
  html += `<button class="btn-day-add" onclick="addDay()">＋ Day 추가</button>`;
  wrap.innerHTML = html;
}

function switchDay(i, btn) {
  state.currentDay = i;
  document.querySelectorAll('.day-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTimeline();
}

function addDay() {
  state.days.push({ label: `Day ${state.days.length + 1}`, items: [] });
  renderDayTabs();
}

// ── SCHEDULE ──
function openScheduleModal(id) {
  editingScheduleId = id || null;
  document.getElementById('scheduleModalTitle').textContent = id ? '일정 수정' : '일정 추가';
  if (id) {
    const item = state.days[state.currentDay].items.find(x => x.id === id);
    if (item) {
      document.getElementById('sTime').value = item.startTime;
      document.getElementById('eTime').value = item.endTime;
      document.getElementById('sTitle').value = item.title;
      document.getElementById('sType').value = item.type;
      document.getElementById('sCost').value = item.cost || '';
      document.getElementById('sLocation').value = item.location || '';
      document.getElementById('sMemo').value = item.memo || '';
    }
  } else {
    document.getElementById('sTime').value = '09:00';
    document.getElementById('eTime').value = '10:00';
    document.getElementById('sTitle').value = '';
    document.getElementById('sType').value = 'activity';
    document.getElementById('sCost').value = '';
    document.getElementById('sLocation').value = '';
    document.getElementById('sMemo').value = '';
  }
  document.getElementById('scheduleModal').classList.add('open');
}

function saveSchedule() {
  const title = document.getElementById('sTitle').value.trim();
  if (!title) { alert('일정 제목을 입력해주세요.'); return; }
  const item = {
    id: editingScheduleId || uid(),
    startTime: document.getElementById('sTime').value,
    endTime: document.getElementById('eTime').value,
    title,
    type: document.getElementById('sType').value,
    cost: parseFloat(document.getElementById('sCost').value) || 0,
    location: document.getElementById('sLocation').value,
    memo: document.getElementById('sMemo').value,
  };
  const items = state.days[state.currentDay].items;
  if (editingScheduleId) {
    const idx = items.findIndex(x => x.id === editingScheduleId);
    if (idx !== -1) items[idx] = item;
  } else {
    items.push(item);
  }
  items.sort((a, b) => a.startTime.localeCompare(b.startTime));
  closeModal('scheduleModal');
  renderTimeline();
}

function deleteSchedule(id) {
  if (!confirm('이 일정을 삭제할까요?')) return;
  state.days[state.currentDay].items = state.days[state.currentDay].items.filter(x => x.id !== id);
  renderTimeline();
}

const typeMap = {
  activity: { label: '관광', cls: 'badge-activity', icon: '🎡' },
  meal:     { label: '식사', cls: 'badge-meal',     icon: '🍜' },
  transport:{ label: '이동', cls: 'badge-transport', icon: '🚌' },
  hotel:    { label: '숙박', cls: 'badge-hotel',    icon: '🏨' },
  etc:      { label: '기타', cls: 'badge-etc',      icon: '📌' },
};

function renderTimeline() {
  const items = state.days[state.currentDay]?.items || [];
  const container = document.getElementById('timelineList');
  const empty = document.getElementById('scheduleEmpty');
  if (items.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  container.innerHTML = items.map(item => {
    const t = typeMap[item.type] || typeMap.etc;
    return `
    <div class="timeline-item">
      <div class="timeline-time">${item.startTime}<br><span style="color:var(--border)">↓</span><br>${item.endTime}</div>
      <div class="timeline-dot"></div>
      <div class="timeline-card">
        <div class="timeline-card-top">
          <div class="timeline-card-info">
            <div class="timeline-card-title">${t.icon} ${item.title}</div>
            <div class="timeline-card-sub">
              ${item.location ? `<span>📍 ${item.location}</span>` : ''}
              ${item.cost ? `<span>💳 ${formatNum(item.cost)}</span>` : ''}
              ${item.memo ? `<span>📝 ${item.memo}</span>` : ''}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
            <span class="timeline-badge ${t.cls}">${t.label}</span>
            <div class="card-actions">
              <button class="btn-icon" onclick="openScheduleModal('${item.id}')" data-tooltip="수정">✏️</button>
              <button class="btn-icon del" onclick="deleteSchedule('${item.id}')" data-tooltip="삭제">🗑</button>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── RESERVATION ──
const resTypeMap = {
  flight: { label: '항공', icon: '✈️', cls: 'flight' },
  hotel:  { label: '숙소', icon: '🏨', cls: 'hotel' },
  tour:   { label: '투어', icon: '🎡', cls: 'tour' },
  car:    { label: '렌터카', icon: '🚗', cls: 'car' },
  other:  { label: '기타', icon: '📌', cls: 'other' },
};

function openResModal(id) {
  editingResId = id || null;
  if (id) {
    const r = state.reservations.find(x => x.id === id);
    if (r) {
      document.getElementById('rType').value = r.type;
      document.getElementById('rName').value = r.name;
      document.getElementById('rDateIn').value = r.dateIn;
      document.getElementById('rDateOut').value = r.dateOut;
      document.getElementById('rTimeIn').value = r.timeIn;
      document.getElementById('rTimeOut').value = r.timeOut;
      document.getElementById('rConfirm').value = r.confirm;
      document.getElementById('rCost').value = r.cost || '';
      document.getElementById('rStatus').value = r.status;
      document.getElementById('rMemo').value = r.memo || '';
    }
  } else {

    document.getElementById('rDateIn').value = '';
    document.getElementById('rDateOut').value = '';

    document.getElementById('rTimeOut').value = '';
    document.getElementById('rConfirm').value = '';
    document.getElementById('rCost').value = '';
    document.getElementById('rStatus').value = 'confirmed';

}

function saveReservation() {
  const name = document.getElementById('rName').value.trim();
  if (!name) { alert('예약명을 입력해주세요.'); return; }
  const r = {
    id: editingResId || uid(),
    type: document.getElementById('rType').value,
    name,
    dateIn: document.getElementById('rDateIn').value,
    dateOut: document.getElementById('rDateOut').value,
    timeIn: document.getElementById('rTimeIn').value,
    timeOut: document.getElementById('rTimeOut').value,

    memo: document.getElementById('rMemo').value,
  };

function deleteReservation(id) {

  state.reservations = state.reservations.filter(x => x.id !== id);
  renderReservations();
}

const statusMap = {
  confirmed: { label: '확정', cls: 'status-confirmed', icon: '✅' },
  pending:   { label: '대기중', cls: 'status-pending',   icon: '⏳' },
  cancelled: { label: '취소됨', cls: 'status-cancelled', icon: '❌' },
};

function renderReservations() {
  const grid = document.getElementById('resGrid');
  if (!state.reservations.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🎫</div><div class="empty-text">등록된 예약이 없습니다.<br>항공, 숙소, 투어 등을 추가해보세요!</div></div>`;
    return;
  }
  const sorted = [...state.reservations].sort((a,b) => (a.dateIn||'').localeCompare(b.dateIn||''));
  grid.innerHTML = sorted.map(r => {
    const t = resTypeMap[r.type] || resTypeMap.other;
    const s = statusMap[r.status] || statusMap.confirmed;
    const currency = getCurrencySymbol();
    return `
    <div class="res-card">
      <div class="res-card-header">
        <div class="res-icon ${t.cls}">${t.icon}</div>
        <div>
          <div class="res-card-type">${t.label}</div>
          <div class="res-card-name">${r.name}</div>
        </div>
        <div style="margin-left:auto;display:flex;gap:4px;">
          <button class="btn-icon" onclick="openResModal('${r.id}')">✏️</button>
          <button class="btn-icon del" onclick="deleteReservation('${r.id}')">🗑</button>
        </div>
      </div>
      <div class="res-card-body">
        ${r.dateIn ? `<div class="res-row"><span class="res-row-label">${r.type==='hotel'?'체크인':'날짜'}</span><span class="res-row-value">${r.dateIn}${r.timeIn?' '+r.timeIn:''}</span></div>` : ''}
        ${r.dateOut ? `<div class="res-row"><span class="res-row-label">${r.type==='hotel'?'체크아웃':'도착'}</span><span class="res-row-value">${r.dateOut}${r.timeOut?' '+r.timeOut:''}</span></div>` : ''}
        ${r.confirm ? `<div class="res-row"><span class="res-row-label">예약번호</span><span class="res-row-value" style="font-family:'DM Mono',monospace;letter-spacing:1px">${r.confirm}</span></div>` : ''}
        ${r.memo ? `<div class="res-row" style="align-items:flex-start"><span class="res-row-label">메모</span><span class="res-row-value" style="font-size:12px;color:var(--muted);text-align:right;max-width:200px">${r.memo}</span></div>` : ''}
      </div>
      <div class="res-card-footer">
        <span class="res-status ${s.cls}">${s.icon} ${s.label}</span>
        <span class="res-cost">${r.cost ? currency + formatNum(r.cost) : '—'}</span>
      </div>
    </div>`;
  }).join('');
}

// ── EXPENSE ──
const catColors = {
  '항공': '#4a8aaa', '숙박': '#9c6cc0', '식비': '#e8845f',
  '교통': '#5ba87a', '관광': '#d4a83a', '쇼핑': '#c9623f', '기타': '#8a8070',
};
const catIcons = {
  '항공':'✈️','숙박':'🏨','식비':'🍜','교통':'🚌','관광':'🎡','쇼핑':'🛍','기타':'📌'
};

function openExpenseModal(id) {
  editingExpId = id || null;
  if (id) {
    const e = state.expenses.find(x => x.id === id);
    if (e) {
      document.getElementById('expTitle').value = e.title;
      document.getElementById('expCat').value = e.cat;
      document.getElementById('expDate').value = e.date;
      document.getElementById('expAmount').value = e.amount;
      document.getElementById('expPay').value = e.pay;
      document.getElementById('expMemo').value = e.memo || '';
    }
  } else {
    document.getElementById('expTitle').value = '';
    document.getElementById('expCat').value = '식비';
    document.getElementById('expDate').value = '';
    document.getElementById('expAmount').value = '';
    document.getElementById('expPay').value = '카드';
    document.getElementById('expMemo').value = '';
  }
  document.getElementById('expenseModal').classList.add('open');
}

function saveExpense() {
  const title = document.getElementById('expTitle').value.trim();
  const amount = parseFloat(document.getElementById('expAmount').value);
  if (!title) { alert('항목명을 입력해주세요.'); return; }
  if (!amount) { alert('금액을 입력해주세요.'); return; }
  const e = {
    id: editingExpId || uid(),
    title,
    cat: document.getElementById('expCat').value,
    date: document.getElementById('expDate').value,
    amount,
    pay: document.getElementById('expPay').value,
    memo: document.getElementById('expMemo').value,
  };
  if (editingExpId) {
    const idx = state.expenses.findIndex(x => x.id === editingExpId);
    if (idx !== -1) state.expenses[idx] = e;
  } else {
    state.expenses.push(e);
  }
  closeModal('expenseModal');
  updateBudgetCards();
}

function deleteExpense(id) {
  if (!confirm('이 지출을 삭제할까요?')) return;
  state.expenses = state.expenses.filter(x => x.id !== id);
  updateBudgetCards();
}

function getCurrencySymbol() {
  const map = { KRW:'₩', USD:'$', JPY:'¥', EUR:'€', THB:'฿' };
  return map[document.getElementById('currencySelect').value] || '₩';
}

function formatNum(n) {
  if (!n) return '0';
  return Math.round(n).toLocaleString('ko-KR');
}

function updateBudgetCards() {
  const currency = getCurrencySymbol();
  const budget = parseFloat(document.getElementById('totalBudget').value) || 0;
  const spent = state.expenses.reduce((a,e) => a + e.amount, 0);
  const remaining = budget - spent;
  const people = parseInt(document.getElementById('tripPeople').value) || 1;

  const startVal = document.getElementById('tripStart').value;
  const endVal   = document.getElementById('tripEnd').value;
  let days = 1;
  if (startVal && endVal) {
    const diff = (new Date(endVal) - new Date(startVal)) / 86400000;
    if (diff > 0) days = Math.round(diff) + 1;
  }

  document.getElementById('totalBudgetDisplay').textContent = budget ? currency + formatNum(budget) : '—';
  document.getElementById('totalSpentDisplay').textContent = currency + formatNum(spent);
  document.getElementById('remainingDisplay').textContent = budget ? currency + formatNum(remaining) : '—';
  document.getElementById('perPersonDisplay').textContent = currency + formatNum(spent / people);
  document.getElementById('perDayDisplay').textContent = `일당 ${currency}${formatNum(spent / days)}`;

  const pct = budget ? Math.min((spent / budget) * 100, 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('spentPercent').textContent = budget ? `예산 대비 ${Math.round(pct)}%` : '예산 미설정';

  renderPieChart();
  renderExpenseTable();
}

function renderPieChart() {
  const catTotals = {};
  state.expenses.forEach(e => {
    catTotals[e.cat] = (catTotals[e.cat] || 0) + e.amount;
  });
  const total = Object.values(catTotals).reduce((a,b) => a+b, 0);
  const svg = document.getElementById('pieChart');
  const legend = document.getElementById('pieLegend');

  if (!total) {
    svg.innerHTML = `<circle cx="60" cy="60" r="50" fill="var(--sand)"/><text x="60" y="65" text-anchor="middle" font-size="11" fill="var(--muted)" font-family="'Noto Sans KR',sans-serif">데이터 없음</text>`;
    legend.innerHTML = `<div class="legend-item" style="color:var(--muted);font-size:12px;">지출을 추가하면<br>그래프가 표시됩니다</div>`;
    return;
  }

  const cx = 60, cy = 60, r = 50;
  let paths = '', startAngle = -Math.PI / 2;
  const entries = Object.entries(catTotals).sort((a,b) => b[1]-a[1]);
  entries.forEach(([cat, val]) => {
    const angle = (val / total) * 2 * Math.PI;
    const endAngle = startAngle + angle;
    const x1 = cx + r * Math.cos(startAngle);
    const y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(endAngle);
    const y2 = cy + r * Math.sin(endAngle);
    const large = angle > Math.PI ? 1 : 0;
    const color = catColors[cat] || '#aaa';
    paths += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r},0,${large},1,${x2},${y2}Z" fill="${color}" stroke="white" stroke-width="2"/>`;
    startAngle = endAngle;
  });
  // Center hole
  paths += `<circle cx="${cx}" cy="${cy}" r="28" fill="white"/>`;
  const pct = Math.round((entries[0][1] / total) * 100);
  paths += `<text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--ink)" font-family="'DM Mono',monospace">${pct}%</text>`;
  paths += `<text x="${cx}" y="${cy+10}" text-anchor="middle" font-size="9" fill="var(--muted)" font-family="'Noto Sans KR',sans-serif">${entries[0][0]}</text>`;
  svg.innerHTML = paths;

  legend.innerHTML = entries.map(([cat, val]) => {
    const currency = getCurrencySymbol();
    return `<div class="legend-item">
      <div class="legend-dot" style="background:${catColors[cat]||'#aaa'}"></div>
      <span>${catIcons[cat]||'📌'} ${cat}</span>
      <span style="margin-left:auto;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">${currency}${formatNum(val)}</span>
    </div>`;
  }).join('');
}

function renderExpenseTable() {
  const filter = document.getElementById('filterCat').value;
  const list = state.expenses.filter(e => !filter || e.cat === filter)
    .sort((a,b) => (a.date||'').localeCompare(b.date||''));
  const currency = getCurrencySymbol();
  const tbody = document.getElementById('expenseTableBody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:30px;">지출 내역이 없습니다</td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(e => `
    <tr>
      <td style="color:var(--muted);font-size:12px">${e.date||'—'}</td>
      <td style="font-weight:500">${e.title}</td>
      <td><span class="cat-badge" style="background:${catColors[e.cat]||'#eee'}22;color:${catColors[e.cat]||'#666'}">${catIcons[e.cat]||'📌'} ${e.cat}</span></td>
      <td style="color:var(--muted);font-size:12px">${e.pay}</td>
      <td class="amount-cell">${currency}${formatNum(e.amount)}</td>
      <td>
        <div style="display:flex;gap:4px;justify-content:flex-end">
          <button class="btn-icon" onclick="openExpenseModal('${e.id}')">✏️</button>
          <button class="btn-icon del" onclick="deleteExpense('${e.id}')">🗑</button>
        </div>
      </td>
    </tr>`).join('');
}

// ── MODAL UTILS ──
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) closeModal(el.id); });
});

// ── EXPORT / SAVE ──
function exportData() {
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const dest = document.getElementById('tripDest').value || 'voyage';
  a.download = `${dest}-travel-plan.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}
